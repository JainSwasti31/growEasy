version: '3.8'
services:
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
      target: prod
    env_file:
      - ./server/.env
    ports:
      - "4000:4000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:4000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  client:
    build:
      context: .
      dockerfile: client/Dockerfile
      target: prod
    env_file:
      - ./client/.env
    ports:
      - "3000:3000"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

# Notes:
# - Supply secrets via server/.env and client/.env (not checked into git)
# - To build and run: `docker-compose up --build`
